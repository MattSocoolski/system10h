bio: >
  8 lat w sprzedaży B2B. 5 z nich w UGEARS — wszedłem do Auchan, Empik,
  70 punktów dystrybucji. Setki maili tygodniowo, ręcznie. Wypalenie.
  Potem odkryłem AI i zrobiłem w 15 minut to, na co wcześniej szedł cały dzień.
  Pomyślałem: skoro to działa dla mnie, mogę to budować dla innych.
  Dziś robię done-for-you AI-systemy dla handlowców B2B. Nie uczę promptów —
  konfiguruję gotowego asystenta który pisze maile, pilnuje follow-upów
  i broni marży. W stylu handlowca, nie robota (stylometria na prawdziwych mailach).
  Równolegle prowadzę sprzedaż B2B art&hobby na rynki CEE jako zewnętrzny KAM w Artnapi.
  Gliwice, 28 lat, żonaty. Priorytet: rodzina i służba — pracuję max 6-7h dziennie,
  więc muszę być wydajny. AI w tym pomaga.
