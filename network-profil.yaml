moi_klienci: >
  Handlowcy B2B solo i właściciele firm którzy sami sprzedają.
  Produkcja, import, usługi. Tracą 3-4h dziennie na maile i follow-upy,
  a chcą żeby ktoś to zrobił za nich. Nie szukają kursu — szukają gotowego systemu.
aktualny_problem: >
