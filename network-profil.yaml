oferta_paid: >
  Bliźniak Biznesowy (2 999 PLN netto) — AI-asystent skonfigurowany pod TWÓJ biznes.
  16 workflow'ów: maile, follow-upy, obrona ceny, pipeline, outreach, kwalifikacja leadów.
  Stylometria: analizuję Twoje prawdziwe maile, AI pisze jak TY.
  Gotowy w 2 dni. Gwarancja 30 dni zwrotu. Case: Stalton CNC, wdrożenie w 6 dni.
  Pakiet PRO (4 999 PLN): pełna architektura + 10 agentów + routing + pamięć aktywna.
